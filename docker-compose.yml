services:
  baker-street:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
      - "3100:3100"
    environment:
      PGLITE_DATA_DIR: /data/pglite
      MCP_API_KEY: ${MCP_API_KEY:-dev-api-key-change-me}
      MCP_PORT: 3100
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - pglite-data:/data/pglite

volumes:
  pglite-data:
