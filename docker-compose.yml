services:
  baker-street:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
      - "3100:3100"
    environment:
      SQLITE_DB_PATH: /data/tasks.db
      MCP_API_KEY: ${MCP_API_KEY:-dev-api-key-change-me}
      MCP_PORT: 3100
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:
